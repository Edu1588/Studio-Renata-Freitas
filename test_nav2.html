<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(to bottom, #f0f0f0 50%, #3a0d16 50%); height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
</style>
</head>
<body>

<!-- Inside light area -->
<div class="fixed top-10 flex gap-3">
  <a href="#" class="relative px-4 py-1.5 text-sm font-medium rounded-[20px] overflow-hidden group border border-white/40">
    <div class="absolute inset-0 bg-white/5 backdrop-blur-md transition-colors group-hover:bg-white/20 -z-10 pointer-events-none"></div>
    <span class="mix-blend-difference text-white">Option 1</span>
  </a>
</div>

<!-- Inside dark area -->
<div class="fixed bottom-10 flex gap-3">
  <a href="#" class="relative px-4 py-1.5 text-sm font-medium rounded-[20px] overflow-hidden group border border-white/40">
    <div class="absolute inset-0 bg-white/5 backdrop-blur-md transition-colors group-hover:bg-white/20 -z-10 pointer-events-none"></div>
    <span class="mix-blend-difference text-white">Option 2</span>
  </a>
</div>

</body>
</html>
