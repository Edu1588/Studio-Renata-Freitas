<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { height: 100vh; margin: 0; display: flex; flex-direction: column; background-image: url('https://studiorenatafreitas.com.br/wp-content/uploads/2025/10/CL_0444-scaled-1.jpg'); background-size: cover; }
  .nav-container { padding: 40px; display: flex; gap: 10px; }
  
  .glass-btn {
    position: relative;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }
  
  .glass-bg {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    z-index: -1;
  }
  
  .glass-border {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="nav-container">
  <a href="#" class="glass-btn mix-blend-difference">
    <div class="glass-bg"></div>
    <div class="glass-border"></div>
    <span>O Studio</span>
  </a>
</div>

</body>
</html>
